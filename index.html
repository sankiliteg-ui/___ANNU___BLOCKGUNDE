<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Annu - 3D Elite</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --success: #39ff14;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* 3D Background Particles */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            z-index: 0;
        }

        .light-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveParticle 10s linear infinite;
            will-change: transform;
        }

        @keyframes moveParticle {
            from { transform: translateZ(0px) translateY(0vh); }
            to { transform: translateZ(1000px) translateY(-100vh); }
        }

        /* 3D Text Container */
        .scene {
            position: relative;
            z-index: 10;
            perspective: 1500px;
        }

        .text-box {
            transform-style: preserve-3d;
            animation: floating 4s ease-in-out infinite alternate;
        }

        .wire-text {
            font-size: 3.5rem;
            text-align: center;
            color: transparent;
            -webkit-text-stroke: 1.2px #fff;
            letter-spacing: 6px;
            line-height: 1.1;
            position: relative;
            animation: 
                wireColor 6s linear infinite,
                electricFlicker 4s infinite;
        }

        /* Depth Layer */
        .wire-text::after {
            content: attr(data-text);
            position: absolute;
            left: 5px;
            top: 5px;
            z-index: -1;
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
            filter: blur(10px);
            opacity: 0.5;
        }

        /* Smooth 3D Floating */
        @keyframes floating {
            0% { transform: rotateX(10deg) rotateY(-10deg) translateY(0px); }
            100% { transform: rotateX(20deg) rotateY(10deg) translateY(-20px); }
        }

        /* Advanced Color Wire Cycle */
        @keyframes wireColor {
            0%, 100% { -webkit-text-stroke-color: var(--primary); filter: drop-shadow(0 0 15px var(--primary)); }
            33% { -webkit-text-stroke-color: var(--secondary); filter: drop-shadow(0 0 15px var(--secondary)); }
            66% { -webkit-text-stroke-color: var(--success); filter: drop-shadow(0 0 15px var(--success)); }
        }

        /* Realistic Flickering Wire */
        @keyframes electricFlicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.4; filter: contrast(200%); }
        }

        /* Responsive Mobile UI */
        @media (max-width: 600px) {
            .wire-text { font-size: 2.2rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation" id="bg"></div>

    <div class="scene">
        <div class="text-box">
            <h1 class="wire-text" data-text="GOOD MORNING ANNU">
                GOOD MORNING<br>ANNU
            </h1>
        </div>
    </div>

    <script>
        // Generate random particles for background
        const bg = document.getElementById('bg');
        for (let i = 0; i < 50; i++) {
            const dot = document.createElement('div');
            dot.className = 'light-particle';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.animationDelay = Math.random() * 10 + 's';
            bg.appendChild(dot);
        }
    </script>
</body>
</html>
